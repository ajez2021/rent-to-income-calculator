<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rent Affordability Calculator</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Rent Affordability Calculator</h1>
      <p>Instantly determine what rent your applicant can afford</p>
    </header>

    <div class="card">
      <div class="input-grid">
        <div class="field">
          <label>Monthly Income ($)</label>
          <input type="number" id="income" placeholder="Enter monthly income"/>
        </div>

        <div class="field">
          <label>Desired Rent ($)</label>
          <input type="number" id="rent" placeholder="Enter rent amount"/>
        </div>
      </div>

      <div class="button-row">
        <button onclick="calculate()">Calculate</button>
        <button class="secondary" onclick="resetForm()">Reset</button>
      </div>

      <div id="results" class="results hidden">
        <div class="badge" id="badge"></div>

        <div class="result-box">
          <h3>Max Affordable Rent</h3>
          <p id="maxRent">$0</p>
        </div>

        <div class="ratio-grid">
          <div>2.5x: <span id="twoFive"></span></div>
          <div>3.0x: <span id="three"></span></div>
          <div>3.5x: <span id="threeFive"></span></div>
        </div>

        <div class="button-row">
          <button onclick="copyResults()">Copy Results</button>
          <button onclick="window.print()">Print</button>
        </div>
      </div>
    </div>

    <footer>
      <p>Powered by ezLandlordForms Tools</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
